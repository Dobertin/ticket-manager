<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión · TicketFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="css/base.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:40px 36px;
      width:100%; max-width:380px; box-shadow:var(--shadow-md);
    }
    .login-logo { font-size:22px; font-weight:800; color:var(--accent); margin-bottom:4px; letter-spacing:-.5px; }
    .login-sub  { font-size:13px; color:var(--text-muted); margin-bottom:28px; }

    .tab-row  { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; }
    .tab-btn  { flex:1; padding:8px; background:none; border:none; cursor:pointer;
                font-size:13px; font-weight:500; color:var(--text-muted);
                border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    #loginMsg { display:none; padding:10px 12px; border-radius:var(--radius);
                font-size:13px; margin-bottom:14px; border:1px solid; }

    .btn-submit { width:100%; padding:10px; background:var(--accent); color:#fff;
                  border:none; border-radius:var(--radius); font-size:13px; font-weight:600;
                  cursor:pointer; transition:background .15s; margin-top:4px; }
    .btn-submit:hover { background:var(--accent-hover); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">⚡ TicketFlow</div>
  <div class="login-sub">Gestión de proyectos y tareas</div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Iniciar sesión</button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Registrarse</button>
  </div>

  <div id="loginMsg"></div>

  <!-- Email -->
  <div class="form-row">
    <label class="form-label">Correo electrónico</label>
    <input type="email" id="authEmail" placeholder="tu@correo.com"
      onkeydown="if(event.key==='Enter') handleSubmit()"/>
  </div>

  <!-- Password -->
  <div class="form-row">
    <label class="form-label">Contraseña</label>
    <input type="password" id="authPassword" placeholder="Mínimo 6 caracteres"
      onkeydown="if(event.key==='Enter') handleSubmit()"/>
  </div>

  <!-- Name (register only) -->
  <div class="form-row" id="nameRow" style="display:none">
    <label class="form-label">Tu nombre</label>
    <input type="text" id="authName" placeholder="Nombre completo"/>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Iniciar sesión</button>

  <p style="font-size:11px;color:var(--text-muted);margin-top:16px;text-align:center;line-height:1.6">
    Tus datos se almacenan de forma segura en Supabase.
  </p>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
  let _mode = 'login';

  function switchTab(mode) {
    _mode = mode;
    document.getElementById('tabLogin').classList.toggle('active',    mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    document.getElementById('nameRow').style.display   = mode === 'register' ? 'block' : 'none';
    document.getElementById('submitBtn').textContent   = mode === 'register' ? 'Crear cuenta' : 'Iniciar sesión';
    document.getElementById('loginMsg').style.display  = 'none';
  }

  async function handleSubmit() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const name     = document.getElementById('authName').value.trim();

    if (_mode === 'login') {
      await loginWithPassword(email, password);
    } else {
      // Inject name into metadata before signup
      if (name) {
        // We pass name via options so ensureProfile picks it up
        if (!email || !password) { showLoginError('Completa todos los campos.'); return; }
        if (password.length < 6) { showLoginError('La contraseña debe tener al menos 6 caracteres.'); return; }
        const { data, error } = await db.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        if (error) { showLoginError(error.message); return; }
        if (data.session) {
          window.location.replace('dashboard.html');
        } else {
          showLoginSuccess('¡Cuenta creada! Ahora inicia sesión.');
          switchTab('login');
        }
      } else {
        await registerWithPassword(email, password);
      }
    }
  }

  // If already logged in, go straight to dashboard
  (async () => {
    const session = await getCurrentSession();
    if (session) window.location.replace('dashboard.html');
  })();
</script>
</body>
</html>
