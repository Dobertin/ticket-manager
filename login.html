<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión · TicketFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="css/base.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-md);
    }
    .login-logo  { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: -.5px; }
    .login-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .divider-or  { display: flex; align-items: center; gap: 10px; margin: 20px 0; color: var(--text-muted); font-size: 12px; }
    .divider-or::before, .divider-or::after { content:''; flex:1; height:1px; background:var(--border); }
    #loginMsg    { display: none; padding: 10px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; border: 1px solid currentColor; }
    .btn-github  {
      width: 100%; padding: 10px; background: #24292e; color: #fff;
      border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: background .15s;
    }
    .btn-github:hover { background: #1a1e22; }
    .btn-magic {
      width: 100%; padding: 9px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-magic:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">⚡ TicketFlow</div>
  <div class="login-sub">Gestión de proyectos y tareas</div>

  <div id="loginMsg"></div>

  <!-- GitHub -->
  <button class="btn-github" onclick="loginWithGitHub()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
      <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483
        0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466
        -.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832
        .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688
        -.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004
        1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651
        .64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855
        0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484
        17.522 2 12 2z"/>
    </svg>
    Continuar con GitHub
  </button>

  <div class="divider-or">o</div>

  <!-- Magic Link -->
  <div class="form-row">
    <label class="form-label">Correo electrónico</label>
    <input type="email" id="magicEmail" placeholder="tu@correo.com"
      onkeydown="if(event.key==='Enter') loginWithMagicLink(document.getElementById('magicEmail').value)"/>
  </div>
  <button class="btn-magic" onclick="loginWithMagicLink(document.getElementById('magicEmail').value)">
    Enviar enlace de acceso
  </button>

  <p style="font-size:11px;color:var(--text-muted);margin-top:16px;text-align:center;line-height:1.6">
    Al ingresar aceptas que tus datos se almacenen de forma segura en Supabase.
  </p>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
  // If already logged in, redirect
  (async () => {
    const session = await getCurrentSession();
    if (session) window.location.replace('dashboard.html');
  })();
</script>
</body>
</html>
